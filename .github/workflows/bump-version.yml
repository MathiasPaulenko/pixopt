name: Bump Version and Publish

on:
  push:
    branches: [main, master]

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run ruff
        run: ruff check src tests

      - name: Run mypy
        run: mypy src

  bump:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release build

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Bump version and create tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          set -x
          echo "Running semantic-release version..."
          if semantic-release version; then
            echo "Version bump succeeded"
            git log --oneline -5
            git tag -l
            git remote -v
            git push origin main --tags
            echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          else
            echo "No version bump needed or failed"
            git log --oneline -5
            git tag -l
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: bump
    if: needs.bump.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distribution
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    if: needs.bump.outputs.tag != ''
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pixopt
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        id: trusted-publish
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true

      - name: Publish to PyPI (Token fallback)
        if: steps.trusted-publish.outcome == 'failure'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
