site_name: pixopt
site_url: https://mathiaspaulenko.github.io/pixopt/
site_description: A powerful Python library and CLI tool for optimizing images for web and storage.
site_author: pixopt contributors

theme:
  name: material
  logo: material/image-multiple
  favicon: material/image-multiple
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - header.autohide

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MathiasPaulenko/pixopt
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pixopt/
  version:
    provider: mike

repo_name: pixopt
repo_url: https://github.com/MathiasPaulenko/pixopt
edit_uri: blob/main/docs/

copyright: Copyright &copy; 2026 pixopt contributors

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_category_heading: true
            show_if_no_docstring: true
            show_signature_annotations: true
            show_source: true
            members_order: source
            filters: ["!^_"]
            heading_level: 2

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
  - Usage:
    - CLI Reference: cli.md
    - Library Reference: library.md
  - API Reference: api.md
  - Development:
    - Contributing: contributing.md
    - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - tables
  - toc:
      permalink: true
      title: On this page
